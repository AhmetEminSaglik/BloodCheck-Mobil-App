name: bloodcheck
description: "Demo Medical blood check app."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.5+16

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.11
  http: ^1.1.0
  fl_chart: ^1.2.0
  font_awesome_flutter: ^11.0.0
  flutter_bloc: ^9.1.1
  mobile_scanner: ^6.0.4
  logger: ^2.0.2
  url_launcher: ^6.1.8

  firebase_core: ^4.10.0
  cupertino_icons: ^1.0.8
  firebase_messaging: ^16.3.0
  firebase_analytics: ^12.4.2
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/blood_icon_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/blood_icon_logo.png